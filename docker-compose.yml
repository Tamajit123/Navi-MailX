services:
  ollama:
    image: ollama/ollama:latest
    container_name: navimailx-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: navimailx-app
    ports:
      - "3000:3000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
      OLLAMA_TIMEOUT_MS: 45000
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
