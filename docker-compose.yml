services:
  ollama:
    image: ollama/ollama:latest
    container_name: navimailx-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    image: node:20-alpine
    container_name: navimailx-backend
    working_dir: /app
    command: sh -c "npm install && node server/index.js"
    volumes:
      - ./:/app
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
      OLLAMA_TIMEOUT_MS: 45000
    depends_on:
      ollama:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: navimailx-app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000
    depends_on:
      backend:
        condition: service_started

volumes:
  ollama_data:
